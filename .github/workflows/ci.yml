name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Verify script structure
        run: |
          node -c bc_fetch.mjs && echo "✅ Syntax check passed" || exit 1
          test -f package.json && echo "✅ package.json exists" || exit 1
          test -f README.md && echo "✅ README.md exists" || exit 1

      - name: Test with mock data
        run: |
          # Create a minimal test to verify the script loads correctly
          node -e "
            import('./bc_fetch.mjs').then(() => console.log('✅ Module loads successfully')).catch(err => {
              console.error('❌ Module load failed:', err.message);
              process.exit(1);
            });
          "

      - name: Check for sensitive data
        run: |
          if git grep -i -E "(cookie|token|key|secret|identity|password)" -- ':(exclude).env.sample' ':(exclude)README.md'; then
            echo "::error::Potential sensitive data found in repository"
            exit 1
          fi
          echo "✅ No sensitive data found"
