name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install CLI dependencies
        run: cd cli && npm install

      - name: Install web dependencies
        run: cd web && npm install

      - name: Run CLI tests
        run: cd cli && npm run test

      - name: Check for sensitive data
        run: |
          if git grep -i -E "(cookie|token|key|secret|identity|password)" -- ':(exclude).env.sample' ':(exclude)README.md' ':(exclude).github/workflows/ci.yml' ':(exclude)cli/bc_fetch.mjs' ':(exclude)package-lock.json' ':(exclude)DEPLOYMENT.md'; then
            echo "::error::Potential sensitive data found in repository"
            exit 1
          fi
          echo "✅ No sensitive data found"
